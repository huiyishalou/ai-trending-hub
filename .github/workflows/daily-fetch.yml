name: Daily AI Trending Fetch

on:
  schedule:
    - cron: '0 8 * * *'  # 每天 UTC 8:00 执行
  workflow_dispatch:     # 允许手动触发

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      discussions: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run trending fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LOG_LEVEL: info
          MAX_ITEMS_PER_SOURCE: 30
          AI_RELEVANCE_THRESHOLD: 0.7
        run: npm run fetch

      - name: Commit changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update daily trending" && git push)

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: fetch-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
